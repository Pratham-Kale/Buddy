<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup - Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1 class="logo">🤖 Buddy</h1>
        <p class="subtitle">Your Mental Health Companion</p>

        <h2>Create Your Account 😊</h2>
        <p class="small">Start your journey with Buddy 💛</p>

        <div class="input-box">
            <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email Address">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Confirm Password">
        </div>

        <button class="main-btn" onclick="signup()">❤️ Create Account</button>

        <div class="divider">
            <span></span> OR <span></span>
        </div>

        <button class="google-btn" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
            Continue with Google
        </button>

        <p class="link">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <p class="bottom-text">
            🌱 You are not alone.<br>Buddy is here.
        </p>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
