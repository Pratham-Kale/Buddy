<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-wrapper">

    <!-- BACKGROUND SHAPE -->
    <div class="bg-shape"></div>

    <div class="container">
        <div class="card">

            <h1 class="logo">🤖 Buddy</h1>
            <p class="subtitle">Your Mental Health Companion</p>

            <h2>Welcome Back! 😊</h2>
            <p class="small">Talk freely. I'm here to listen.</p>

            <div class="input-box">
                <input type="email" placeholder="Email Address">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>

            <p class="forgot">Forgot Password?</p>

            <button class="main-btn" onclick="login()">❤️ Login to Buddy</button>

            <div class="divider">
                <span></span> OR <span></span>
            </div>

            <button class="google-btn" onclick="googleLogin()">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
                Continue with Google
            </button>

            <p class="link">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </p>

            <p class="bottom-text">
                🌱 You are not alone.<br>Buddy is here.
            </p>

        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
